<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Login (Demo)</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

body{
height:100vh;
background: radial-gradient(circle at top, #2a004d, #140021);
color:white;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:340px;
}

.demo-banner{
background:#ff4d4d;
color:white;
text-align:center;
padding:6px;
border-radius:8px;
margin-bottom:15px;
font-size:12px;
}

/* Logo */
.logo{
display:flex;
align-items:center;
gap:10px;
margin-bottom:20px;
}

.logo-dot{
width:16px;
height:16px;
border-radius:50%;
background:#8b2cff;
}

/* Tabs */
.tabs{
display:flex;
background:rgba(255,255,255,0.05);
border-radius:14px;
padding:4px;
margin-bottom:30px;
}

.tab{
flex:1;
text-align:center;
padding:10px;
border-radius:12px;
cursor:pointer;
color:#bbb;
}

.tab.active{
background:linear-gradient(90deg,#6c00ff,#b100ff);
color:white;
}

h1{
font-size:28px;
margin-bottom:8px;
}

.subtitle{
color:#aaa;
margin-bottom:25px;
}

.label{
font-size:12px;
letter-spacing:1px;
color:#aaa;
margin-bottom:6px;
}

.input-box{
background:rgba(255,255,255,0.05);
border-radius:14px;
padding:14px;
margin-bottom:16px;
}

input{
background:transparent;
border:none;
outline:none;
color:white;
width:100%;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:linear-gradient(90deg,#6c00ff,#b100ff);
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:.9;
}
</style>
</head>

<body>

<div class="container">

<div class="demo-banner">
DEMO ONLY — No real accounts are created
</div>

<div class="logo">
<div class="logo-dot"></div>
<h3>Vibe with us</h3>
</div>

<div class="tabs">
<div class="tab active" onclick="switchTab('signin')">Sign In</div>
<div class="tab" onclick="switchTab('signup')">Sign Up</div>
</div>

<h1 id="title">Welcome back</h1>
<div class="subtitle" id="subtitle">Sign in to continue</div>

<div class="label">EMAIL</div>
<div class="input-box">
<input type="email" id="email" placeholder="you@example.com">
</div>

<div class="label">PASSWORD</div>
<div class="input-box">
<input type="password" id="password" placeholder="••••••••">
</div>

<button onclick="login()">Sign In →</button>

</div>

<script>
let mode = "signin";

function switchTab(tab){
mode = tab;

document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));

if(tab === "signin"){
document.querySelectorAll(".tab")[0].classList.add("active");
document.getElementById("title").innerText="Welcome back";
document.querySelector("button").innerText="Sign In →";
}else{
document.querySelectorAll(".tab")[1].classList.add("active");
document.getElementById("title").innerText="Create account";
document.querySelector("button").innerText="Sign Up →";
}
}

function login(){
let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

if(email === "" || password === ""){
alert("Please fill in all fields (Demo)");
return;
}

// demo save
localStorage.setItem("demoUser", email);

// redirect
window.location.href = "dashboard.html";
}
</script>

</body>
</html>
