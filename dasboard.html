<!DOCTYPE html>
<html>
<head>
<title>Vibe Dashboard (Demo)</title>
<style>
body{
background:#140021;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
}

.box{
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:20px;
text-align:center;
}

button{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#8b2cff;
color:white;
cursor:pointer;
}

.demo{
color:#ff6b6b;
font-size:12px;
margin-bottom:10px;
}
</style>
</head>

<body>

<div class="box">
<div class="demo">DEMO DASHBOARD</div>
<h2 id="welcome"></h2>
<p>You are now "signed in"</p>

<button onclick="logout()">Logout</button>
</div>

<script>
let user = localStorage.getItem("demoUser");

if(!user){
window.location.href="index.html";
}

document.getElementById("welcome").innerText =
"Welcome, " + user;

function logout(){
localStorage.removeItem("demoUser");
window.location.href="index.html";
}
</script>

</body>
</html>
